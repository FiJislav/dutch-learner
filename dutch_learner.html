<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nederlands — Leren</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 10px 20px;
}
#subtitle { color: #888; margin: 4px 0 8px; font-size: 0.85rem; }

/* ── TOP CONTROLS ── */
#top-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
#chapter-select {
  background: #16213e; color: #a0c4ff; border: 2px solid #6c63ff;
  border-radius: 8px; padding: 7px 14px; font-size: 0.9rem; cursor: pointer; outline: none;
}
#weak-toggle {
  padding: 7px 16px; border: 2px solid #e07070; border-radius: 8px;
  background: transparent; color: #e07070; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
#weak-toggle.active { background: #e07070; color: #1a1a2e; }

#content-toggle {
  display: flex; gap: 0; border: 2px solid #6c63ff; border-radius: 8px; overflow: hidden;
}
.content-btn {
  padding: 6px 13px; border: none; cursor: pointer;
  font-size: 0.82rem; font-weight: 600;
  background: transparent; color: #888;
  transition: background 0.2s, color 0.2s;
}
.content-btn.active { background: #6c63ff; color: #fff; }
#subcat-row {
  display: none; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 6px;
}
#subcat-row.visible { display: flex; }
.subcat-btn {
  padding: 4px 12px; border: 2px solid #6c63ff; border-radius: 20px;
  background: transparent; color: #a0c4ff; font-size: 0.78rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.subcat-btn.active { background: #6c63ff; color: #fff; }

/* ── MODE TABS ── */
.mode-toggle {
  display: flex; flex-wrap: wrap; gap: 0; margin-bottom: 8px;
  border: 2px solid #6c63ff; border-radius: 10px; overflow: hidden;
}
.mode-btn {
  padding: 6px 14px; border: none; cursor: pointer;
  font-size: 0.82rem; font-weight: 600;
  background: transparent; color: #888;
  transition: background 0.2s, color 0.2s;
}
.mode-btn.active { background: #6c63ff; color: #fff; }

/* ── NAV CONTROLS ── */
.controls { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
button {
  padding: 6px 14px; border: none; border-radius: 8px;
  cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: opacity 0.2s;
}
button:hover { opacity: 0.85; }
#btn-prev    { background: #444; color: #eee; }
#btn-next    { background: #a0c4ff; color: #1a1a2e; }
#btn-shuffle { background: #6c63ff; color: #fff; }
#btn-reset   { background: #444; color: #eee; }

/* ── PROGRESS ── */
.progress { color: #888; font-size: 0.82rem; margin-bottom: 6px; }
.progress span { color: #a0c4ff; font-weight: 700; }
.score-bar { display: flex; gap: 16px; margin-bottom: 6px; font-size: 0.82rem; }
.score-correct { color: #4caf93; }
.score-wrong   { color: #e07070; }

/* ── FLIP CARD ── */
.scene {
  width: 380px; max-width: 96vw; height: 220px;
  perspective: 800px; cursor: pointer; margin-bottom: 20px; position: relative;
}
.card {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.45s ease;
  border-radius: 18px;
}
.card.flipped { transform: rotateY(180deg); }
.face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 18px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px; text-align: center;
}
.front { background: linear-gradient(135deg, #16213e, #0f3460); border: 2px solid #6c63ff; }
.back  { background: linear-gradient(135deg, #0f3460, #16213e); border: 2px solid #a0c4ff; transform: rotateY(180deg); }
.lang-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; opacity: 0.5; }
.word  { font-size: 2rem; font-weight: 700; color: #fff; line-height: 1.2; }
.note  { font-size: 0.78rem; color: #aaa; margin-top: 8px; font-style: italic; }
.hint-tap { font-size: 0.72rem; color: #444; margin-top: 12px; }
#btn-speak-flip {
  position: absolute; top: 12px; right: 12px;
  background: transparent; border: none; font-size: 1.3rem;
  cursor: pointer; opacity: 0.4; transition: opacity 0.2s;
}
#btn-speak-flip:hover { opacity: 1; }
.mastery-dot {
  position: absolute; top: 12px; left: 12px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #444;
}
.mastery-dot.green  { background: #4caf93; }
.mastery-dot.yellow { background: #f0c040; }
.mastery-dot.red    { background: #e07070; }

/* ── SHARED INPUT BOX ── */
.exercise-box {
  width: 400px; max-width: 96vw;
  border-radius: 18px; padding: 16px 20px;
  display: none; flex-direction: column; align-items: center;
  gap: 10px; margin-bottom: 12px;
}
.exercise-box.visible { display: flex; }
.ex-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
.ex-question { font-size: 1.7rem; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; }
.ex-input {
  width: 100%; padding: 10px 14px;
  background: #0d1b38; border: 2px solid #444;
  border-radius: 8px; color: #fff; font-size: 1.1rem;
  outline: none; text-align: center; transition: border-color 0.2s;
}
.ex-input:focus { border-color: #6c63ff; }
.ex-input.correct { border-color: #4caf93; background: #0d2b1e; }
.ex-input.wrong   { border-color: #e07070; background: #2b0d0d; }
.ex-feedback { font-size: 0.95rem; min-height: 1.4em; text-align: center; font-weight: 600; }
.ex-feedback.correct { color: #4caf93; }
.ex-feedback.wrong   { color: #e07070; }
.ex-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
#btn-check        { background: #6c63ff; color: #fff; }
#btn-skip         { background: #333; color: #aaa; font-size: 0.82rem; }
#btn-speak-type   { background: #1e3a5f; color: #a0c4ff; font-size: 0.85rem; }
.tts-notice { font-size: 0.72rem; color: #555; }

/* ── TYPE BOX ── */
#type-box { background: linear-gradient(135deg, #16213e, #0f3460); border: 2px solid #6c63ff; }

/* ── MULTIPLE CHOICE ── */
#mc-box { background: linear-gradient(135deg, #16213e, #0f3460); border: 2px solid #a0c4ff; }
.mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.mc-option {
  padding: 12px 10px; border-radius: 10px; border: 2px solid #333;
  background: #0d1b38; color: #eee; cursor: pointer; font-size: 0.95rem;
  text-align: center; transition: border-color 0.15s, background 0.15s;
}
.mc-option:hover  { border-color: #6c63ff; }
.mc-option.correct { border-color: #4caf93; background: #0d2b1e; color: #4caf93; }
.mc-option.wrong   { border-color: #e07070; background: #2b0d0d; color: #e07070; }
.mc-option.reveal  { border-color: #4caf93; background: #0d2b1e; color: #4caf93; }

/* ── GRAMMAR BOX ── */
#grammar-box { background: linear-gradient(135deg, #16213e, #0f3460); border: 2px solid #4caf93; }
.grammar-topic { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #4caf93; opacity: 0.8; }
#grammar-sentence { font-size: 1.15rem; color: #fff; text-align: center; line-height: 1.7; font-weight: 500; }
#grammar-sentence .blank {
  display: inline-block; border-bottom: 2px solid #a0c4ff;
  min-width: 80px; color: #a0c4ff; font-style: italic; text-align: center;
}
#grammar-hint { font-size: 0.78rem; color: #a0c4ff; opacity: 0.7; font-style: italic; margin-top: -6px; }
#grammar-full { font-size: 1rem; color: #a0c4ff; text-align: center; font-style: italic; min-height: 1.4em; }
#grammar-input { width: 200px; }
#btn-grammar-check { background: #4caf93; color: #1a1a2e; font-weight: 700; }
#btn-grammar-skip  { background: #333; color: #aaa; font-size: 0.82rem; }
#btn-speak-grammar { background: #1e3a5f; color: #a0c4ff; font-size: 0.85rem; }

/* ── VERB FORMS BOX ── */
#verb-box { background: linear-gradient(135deg, #16213e, #0f3460); border: 2px solid #c3b1e1; width: 580px; }
#verb-infinitive { font-size: 1.5rem; font-weight: 700; color: #c3b1e1; }
#verb-pronoun { font-size: 1.1rem; color: #a0c4ff; font-style: italic; }
#verb-input { width: 200px; }
#btn-verb-check { background: #c3b1e1; color: #1a1a2e; font-weight: 700; }
#btn-verb-skip  { background: #333; color: #aaa; font-size: 0.82rem; }
#btn-speak-verb { background: #1e3a5f; color: #a0c4ff; font-size: 0.85rem; }

/* ── WORD LIST ── */
details { margin-top: 24px; width: 100%; max-width: 540px; }
summary { cursor: pointer; color: #6c63ff; font-size: 0.9rem; padding: 8px 0; user-select: none; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
th { background: #0f3460; color: #a0c4ff; padding: 8px 12px; text-align: left; }
td { padding: 7px 12px; border-bottom: 1px solid #222; }
tr:hover td { background: #1e2d5a; }
.dutch-col { color: #c3b1e1; font-weight: 600; }

/* ── FOOTER ── */
.footer { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.footer button { background: #222; color: #888; border: 1px solid #333; font-size: 0.8rem; padding: 6px 14px; }
.footer button:hover { color: #eee; border-color: #666; }

/* ── VERB VIEW TOGGLE ── */
.verb-view-toggle { display: flex; gap: 0; border: 2px solid #c3b1e1; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
.verb-view-btn { padding: 4px 14px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 600; background: transparent; color: #888; transition: background 0.2s, color 0.2s; }
.verb-view-btn.active { background: #c3b1e1; color: #1a1a2e; }
#verb-pronoun-display { font-size: 1rem; color: #a0c4ff; font-style: italic; margin-bottom: 4px; }

/* ── VERB TABLE ── */
.verb-table { width: 100%; border-collapse: collapse; margin: 3px 0 6px; }
.verb-table tr + tr td { border-top: 1px solid #1e2d5a; }
.vcell-pronoun { color: #a0c4ff; font-style: italic; white-space: nowrap; padding: 4px 8px 4px 2px; font-size: 0.82rem; width: 26%; vertical-align: middle; }
.vcell-input { padding: 3px 0; width: 30%; }
.vcell-sentence-col { padding: 3px 2px 3px 8px; width: 44%; vertical-align: middle; }
.verb-inp {
  width: 100%; padding: 4px 8px;
  background: #0d1b38; border: 2px solid #333;
  border-radius: 6px; color: #fff; font-size: 0.9rem;
  outline: none; text-align: center; transition: border-color 0.15s;
}
.verb-inp:focus { border-color: #c3b1e1; }
.verb-inp.correct { border-color: #4caf93; background: #0d2b1e; color: #4caf93; }
.verb-inp.wrong   { border-color: #e07070; background: #2b0d0d; color: #e07070; }
.vcell-sentence { color: #a0c4ff; font-style: italic; font-size: 0.76rem; opacity: 0.4; transition: opacity 0.3s; line-height: 1.35; }
.vcell-sentence.show { opacity: 1; }
.vcell-sentence strong { font-style: normal; color: #4caf93; font-weight: 700; }
.vcell-sentence-en { color: #8899bb; font-size: 0.68rem; font-style: normal; display: block; margin-top: 1px; }
.verb-blank { border-bottom: 1px dashed #6c63ff; color: #6c63ff; font-style: normal; }
.vcell-sentence button { background: transparent; border: none; cursor: pointer; color: #6c63ff; font-size: 0.82rem; padding: 0 2px; opacity: 0.7; vertical-align: middle; }
.vcell-sentence button:hover { opacity: 1; }
</style>
</head>
<body>

<p id="subtitle">Click the card to reveal the translation</p>

<div id="top-controls">
  <select id="chapter-select">
    <option value="all">All cards</option>
    <optgroup label="Chapters">
      <option value="Ch 7" selected>Ch 7: In een kledingzaak</option>
    </optgroup>
    <optgroup label="Grammar">
      <option value="grammar-practice">Grammar practice</option>
      <option value="grammar-topics">Grammar topics</option>
    </optgroup>
  </select>
  <div id="content-toggle">
    <button id="btn-words" class="content-btn active">📖 Words</button>
    <button id="btn-grammar-content" class="content-btn">✏️ Grammar</button>
  </div>
  <button id="weak-toggle">⚡ Weak words</button>
</div>
<div id="subcat-row"></div>

<div class="mode-toggle">
  <button class="mode-btn active" data-mode="flip">🃏 Flip</button>
  <button class="mode-btn" data-mode="type">✏️ Type</button>
  <button class="mode-btn" data-mode="mc">🔤 Choice</button>
  <button class="mode-btn" data-mode="grammar">📚 Grammar</button>
  <button class="mode-btn" data-mode="verb">🔀 Verbs</button>
</div>

<div class="controls">
  <button id="btn-prev">← Prev</button>
  <button id="btn-next">Next →</button>
  <button id="btn-shuffle">⇄ Shuffle</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<div class="progress">Card <span id="cur">1</span> of <span id="total">0</span></div>
<div class="score-bar" id="score-bar" style="display:none">
  <span class="score-correct">✓ Correct: <span id="score-c">0</span></span>
  <span class="score-wrong">✗ Wrong: <span id="score-w">0</span></span>
</div>

<!-- Flip card -->
<div class="scene" id="scene">
  <div class="mastery-dot" id="mastery-dot"></div>
  <div class="card" id="card">
    <div class="face front">
      <div class="lang-label">Dutch</div>
      <div class="word" id="flip-dutch"></div>
      <div class="note" id="flip-note"></div>
      <div class="hint-tap">tap to flip</div>
    </div>
    <div class="face back">
      <div class="lang-label">English</div>
      <div class="word" id="flip-english"></div>
    </div>
  </div>
  <button id="btn-speak-flip" title="Listen">🔊</button>
</div>

<!-- Type Dutch -->
<div class="exercise-box" id="type-box">
  <div class="ex-label">English → type Dutch</div>
  <div class="ex-question" id="type-question"></div>
  <input class="ex-input" id="type-input" type="text" placeholder="Type the Dutch word…" autocomplete="off" spellcheck="false" />
  <div class="ex-feedback" id="type-feedback"></div>
  <div class="ex-actions">
    <button id="btn-check">Check ↵</button>
    <button id="btn-speak-type">🔊 Listen</button>
    <button id="btn-skip">Skip</button>
  </div>
  <div class="tts-notice" id="tts-notice"></div>
</div>

<!-- Multiple choice -->
<div class="exercise-box" id="mc-box">
  <div class="ex-label">Dutch → pick English</div>
  <div class="ex-question" id="mc-question"></div>
  <div class="mc-options" id="mc-options"></div>
</div>

<!-- Grammar -->
<div class="exercise-box" id="grammar-box">
  <div class="grammar-topic" id="grammar-topic">📚 Grammar</div>
  <div id="grammar-sentence"></div>
  <div id="grammar-hint"></div>
  <input class="ex-input" id="grammar-input" type="text" placeholder="fill in…" autocomplete="off" spellcheck="false" />
  <div class="ex-feedback" id="grammar-feedback"></div>
  <div id="grammar-full"></div>
  <div class="ex-actions">
    <button id="btn-grammar-check">Check ↵</button>
    <button id="btn-speak-grammar">🔊 Listen</button>
    <button id="btn-grammar-skip">Skip</button>
  </div>
</div>

<!-- Verb forms -->
<div class="exercise-box" id="verb-box">
  <div class="verb-view-toggle">
    <button class="verb-view-btn active" id="btn-verb-table">📋 Table</button>
    <button class="verb-view-btn" id="btn-verb-card">🃏 Cards</button>
  </div>
  <div id="verb-infinitive"></div>
  <table class="verb-table" id="verb-table-el"><tbody id="verb-table-body"></tbody></table>
  <div id="verb-card-view" style="display:none">
    <div id="verb-pronoun-display"></div>
    <input class="ex-input" id="verb-card-input" type="text" placeholder="conjugated form…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="ex-feedback" id="verb-feedback"></div>
  <div class="ex-actions">
    <button id="btn-verb-check">Check ↵</button>
    <button id="btn-speak-verb">🔊 Listen</button>
    <button id="btn-verb-skip">Show answers</button>
  </div>
</div>

<!-- Word list -->
<details>
  <summary>📄 Show full word list</summary>
  <table><tr><th>Dutch</th><th>English</th></tr><tbody id="word-table"></tbody></table>
</details>

<!-- Footer -->
<div class="footer">
  <button id="btn-export">⬇ Export progress</button>
  <button id="btn-import-label" onclick="document.getElementById('import-file').click()">⬆ Import JSON</button>
  <input type="file" id="import-file" accept=".json" style="display:none" />
</div>

// ── STATS ENGINE ──
const STATS_KEY = "nl_learner_stats";

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch { return {}; }
}

function saveStats(stats) {
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function recordResult(id, correct) {
  const stats = loadStats();
  if (!stats[id]) stats[id] = { history: [], seen: 0 };
  stats[id].history.push(correct ? 1 : 0);
  if (stats[id].history.length > 10) stats[id].history.shift();
  stats[id].seen++;
  stats[id].lastSeen = new Date().toISOString().slice(0, 10);
  saveStats(stats);
}

function getMastery(id) {
  const stats = loadStats();
  const s = stats[id];
  if (!s || s.history.length === 0) return { rate: 0, attempts: 0, color: "grey" };
  const rate = s.history.reduce((a, b) => a + b, 0) / s.history.length;
  const color = rate >= 0.8 ? "green" : rate >= 0.5 ? "yellow" : "red";
  return { rate, attempts: s.history.length, color };
}

function isWeak(id) {
  const m = getMastery(id);
  return m.attempts === 0 || m.rate < 0.5;
}

let currentChapter = "Ch 7";
let contentMode    = "words";
let currentSubcat  = null;
let weakMode    = false;
let currentMode = "flip";
let activeDeck  = [];
let idx         = 0;
let answered    = false;
let sessionC    = 0, sessionW = 0;

let grammarQueue    = [];
let grammarIdx      = 0;
let grammarAnswered = false;
let verbDeck        = [];
let verbIdx         = 0;
let verbAnswered    = false;
let verbCardQueue   = [];
let verbCardIdx     = 0;
let verbViewMode    = "table";

function isChapterEntry(ch) {
  return ch !== "grammar-practice" && ch !== "grammar-topics";
}

function getChapterVerbTags(ch) {
  return [...new Set(
    DECK.filter(c => c.type === "verb"
               && c.tag !== "Modal verbs"
               && c.tag !== "verbs"
               && (ch === "all" || c.tag === ch))
        .map(c => c.tag)
  )];
}

function buildActiveDeck() {
  let cards;
  if (currentChapter === "grammar-practice") {
    cards = DECK.filter(c => c.type === "word");
  } else if (currentChapter === "grammar-topics") {
    const tag = currentSubcat || "Modal verbs";
    cards = DECK.filter(c => c.type === "verb" && c.tag === tag);
  } else if (contentMode === "grammar") {
    const tag = currentSubcat || getChapterVerbTags(currentChapter)[0];
    cards = tag ? DECK.filter(c => c.type === "verb" && c.tag === tag) : [];
  } else {
    cards = currentChapter === "all"
      ? DECK.filter(c => c.type === "word")
      : DECK.filter(c => c.type === "word" && c.tag === currentChapter);
  }
  if (weakMode) cards = cards.filter(c => isWeak(c.id));
  return cards;
}

function buildGrammarQueue(deck) {
  const q = [];
  deck.forEach(c => {
    const arr = c.type === "verb" ? c.grammarSentences : c.sentences;
    (arr || []).forEach(s => q.push({ card: c, ...s }));
  });
  return q;
}

function buildVerbDeck(deck) {
  return deck.filter(c => c.type === "verb");
}

function buildVerbCardQueue(deck) {
  const q = [];
  deck.filter(c => c.type === "verb")
      .forEach(c => Object.entries(c.conjugations).forEach(([p, f]) =>
        q.push({ card: c, pronoun: p, answer: f })
      ));
  return q;
}

function makeSubcatBtn(label, tag) {
  const btn = document.createElement("button");
  btn.className = "subcat-btn" + (currentSubcat === tag ? " active" : "");
  btn.textContent = label;
  btn.addEventListener("click", () => {
    currentSubcat = tag;
    rebuildDecks();
    setMode(currentMode);
    updateSubcatRow();
  });
  return btn;
}

function updateContentToggle() {
  const toggle = document.getElementById("content-toggle");
  toggle.style.display = isChapterEntry(currentChapter) ? "" : "none";
  document.getElementById("btn-words").classList.toggle("active", contentMode === "words");
  document.getElementById("btn-grammar-content").classList.toggle("active", contentMode === "grammar");
}

function updateSubcatRow() {
  const row = document.getElementById("subcat-row");
  row.innerHTML = "";
  row.classList.remove("visible");

  if (currentChapter === "grammar-topics") {
    if (!currentSubcat) currentSubcat = "Modal verbs";
    row.classList.add("visible");
    [["Modal verbs", "Modal verbs"], ["Verb forms", "verbs"]].forEach(([label, tag]) =>
      row.appendChild(makeSubcatBtn(label, tag))
    );
  } else if (contentMode === "grammar" && isChapterEntry(currentChapter)) {
    const tags = getChapterVerbTags(currentChapter);
    if (tags.length) {
      if (!tags.includes(currentSubcat)) currentSubcat = tags[0];
      row.classList.add("visible");
      tags.forEach(tag =>
        row.appendChild(makeSubcatBtn(`Verb conjugation (${tag})`, tag))
      );
    }
  }
}

function rebuildDecks() {
  activeDeck    = buildActiveDeck();
  idx           = 0;
  grammarQueue  = buildGrammarQueue(activeDeck);
  grammarIdx    = 0;
  verbDeck      = buildVerbDeck(activeDeck);
  verbIdx       = 0;
  verbCardQueue = buildVerbCardQueue(activeDeck);
  verbCardIdx   = 0;
  updateProgress();
  updateWordTable();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function parse(dutch) {
  const m = dutch.match(/^(.*?)\s*(\([^)]+\))?\s*$/);
  return { word: m ? m[1].trim() : dutch, note: m && m[2] ? m[2] : "" };
}

function acceptedForms(dutch) {
  const forms = new Set([dutch.toLowerCase().trim()]);
  const stripped = dutch.replace(/\s*\([^)]+\)/g, "").trim().toLowerCase();
  forms.add(stripped);
  const inner = dutch.match(/\(([^)]+)\)/);
  if (inner) forms.add(inner[1].toLowerCase().trim());
  return [...forms];
}

// ── TTS ──
let dutchVoice = null;
function loadDutchVoice() {
  const voices = speechSynthesis.getVoices();
  dutchVoice = voices.find(v => v.lang.startsWith("nl")) || null;
  const el = document.getElementById("tts-notice");
  if (el && !dutchVoice && voices.length > 0)
    el.textContent = "No Dutch voice found — using default";
}
if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = loadDutchVoice;
  loadDutchVoice();
}
function speakDutch(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text.replace(/\s*\([^)]*\)/g, "").trim());
  utt.lang = "nl-NL"; utt.rate = 0.9;
  if (dutchVoice) utt.voice = dutchVoice;
  speechSynthesis.speak(utt);
}

// ── PROGRESS + SCORE ──
function updateProgress() {
  const size = ["grammar","verb"].includes(currentMode)
    ? (currentMode === "grammar" ? grammarQueue.length : (verbViewMode === "table" ? verbDeck.length : verbCardQueue.length))
    : activeDeck.length;
  const cur = ["grammar","verb"].includes(currentMode)
    ? (currentMode === "grammar" ? grammarIdx : (verbViewMode === "table" ? verbIdx : verbCardIdx))
    : idx;
  document.getElementById("cur").textContent   = size ? cur + 1 : 0;
  document.getElementById("total").textContent = size;
}

function updateScoreBar() {
  document.getElementById("score-c").textContent = sessionC;
  document.getElementById("score-w").textContent = sessionW;
}

function resetSession() {
  sessionC = 0; sessionW = 0;
  updateScoreBar();
}

function updateWordTable() {
  const tbody = document.getElementById("word-table");
  tbody.innerHTML = "";
  activeDeck.filter(c => c.type === "word").forEach(c => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="dutch-col">${c.dutch}</td><td>${c.english}</td>`;
    tbody.appendChild(tr);
  });
}

// ── MODE SWITCHING ──
const BOXES = { flip: "scene", type: "type-box", mc: "mc-box", grammar: "grammar-box", verb: "verb-box" };
function setMode(m) {
  currentMode = m;
  Object.entries(BOXES).forEach(([mode, id]) => {
    const el = document.getElementById(id);
    if (mode === "flip") el.style.display = m === "flip" ? "" : "none";
    else el.classList.toggle("visible", mode === m);
  });
  document.querySelectorAll(".mode-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.mode === m));
  const scoreBar = document.getElementById("score-bar");
  scoreBar.style.display = m === "flip" ? "none" : "flex";
  const subtitles = {
    flip:    "Click the card to reveal the translation",
    type:    "See the English — type the Dutch word",
    mc:      "See the Dutch — pick the correct English",
    grammar: "Fill in the missing Dutch word",
    verb:    "Type the correct conjugated form",
  };
  document.getElementById("subtitle").textContent = subtitles[m];
  resetSession();
  if (m === "flip")    showFlip();
  else if (m === "type")    showTyping();
  else if (m === "mc")      showMC();
  else if (m === "grammar") showGrammar();
  else if (m === "verb")    showVerbForm();
}

// ── FLIP CARDS MODE ──
function showFlip() {
  if (!activeDeck.length) return;
  const card = activeDeck[idx];
  const { word, note } = parse(card.dutch);
  document.getElementById("flip-dutch").textContent   = word;
  document.getElementById("flip-note").textContent    = note;
  document.getElementById("flip-english").textContent = card.english;
  document.getElementById("card").classList.remove("flipped");
  const dot = document.getElementById("mastery-dot");
  const m = getMastery(card.id);
  dot.className = "mastery-dot " + m.color;
  updateProgress();
}

// ── TYPE DUTCH MODE ──
function showTyping() {
  if (!activeDeck.length) return;
  const card = activeDeck[idx];
  document.getElementById("type-question").textContent = card.english;
  const inp = document.getElementById("type-input");
  inp.value = ""; inp.className = "ex-input";
  document.getElementById("type-feedback").textContent = "";
  document.getElementById("type-feedback").className = "ex-feedback";
  answered = false;
  updateProgress();
  setTimeout(() => inp.focus(), 50);
}

function checkTyping() {
  if (answered) { idx = (idx + 1) % activeDeck.length; showTyping(); return; }
  const card = activeDeck[idx];
  const inp  = document.getElementById("type-input");
  const fb   = document.getElementById("type-feedback");
  const val  = inp.value.trim().toLowerCase();
  if (!val) return;
  const correct = acceptedForms(card.dutch).includes(val);
  answered = true;
  recordResult(card.id, correct);
  if (correct) {
    sessionC++;
    inp.classList.add("correct");
    fb.textContent = "✓ Correct!"; fb.className = "ex-feedback correct";
  } else {
    sessionW++;
    inp.classList.add("wrong");
    fb.textContent = `✗ Answer: ${card.dutch}`; fb.className = "ex-feedback wrong";
  }
  speakDutch(card.dutch);
  updateScoreBar();
}

// ── MULTIPLE CHOICE MODE ──
function buildDistractors(correctCard) {
  let pool = activeDeck.filter(c => c.id !== correctCard.id);
  if (pool.length < 3) {
    const seen = new Set(pool.map(c => c.id));
    seen.add(correctCard.id);
    pool = pool.concat(DECK.filter(c => !seen.has(c.id)));
  }
  shuffle(pool);
  return pool.slice(0, 3).map(c => c.english);
}

function showMC() {
  if (!activeDeck.length) return;
  const card = activeDeck[idx];
  document.getElementById("mc-question").textContent = card.dutch;
  const options = [card.english, ...buildDistractors(card)];
  shuffle(options);
  const container = document.getElementById("mc-options");
  container.innerHTML = "";
  options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "mc-option";
    btn.textContent = `${i + 1}. ${opt}`;
    btn.dataset.value = opt;
    btn.addEventListener("click", () => checkMC(btn, card, opt));
    container.appendChild(btn);
  });
  answered = false;
  updateProgress();
}

function checkMC(btn, card, chosen) {
  if (answered) return;
  answered = true;
  const correct = chosen === card.english;
  recordResult(card.id, correct);
  document.querySelectorAll(".mc-option").forEach(b => {
    if (b.dataset.value === card.english) b.classList.add("reveal");
    else if (b === btn && !correct)       b.classList.add("wrong");
  });
  if (correct) { sessionC++; } else { sessionW++; }
  updateScoreBar();
  setTimeout(() => { idx = (idx + 1) % activeDeck.length; showMC(); }, 1000);
}

// ── GRAMMAR MODE ──
function showGrammar() {
  if (!grammarQueue.length) {
    document.getElementById("grammar-sentence").innerHTML = "No grammar exercises for this selection.";
    return;
  }
  const ex = grammarQueue[grammarIdx];
  document.getElementById("grammar-topic").textContent   = "📚 Grammar";
  document.getElementById("grammar-hint").textContent    = ex.hint || "";
  document.getElementById("grammar-sentence").innerHTML  =
    ex.s.replace("___", '<span class="blank">___</span>');
  document.getElementById("grammar-full").textContent    = "";
  const inp = document.getElementById("grammar-input");
  inp.value = ""; inp.className = "ex-input";
  document.getElementById("grammar-feedback").textContent = "";
  document.getElementById("grammar-feedback").className  = "ex-feedback";
  grammarAnswered = false;
  updateProgress();
  setTimeout(() => inp.focus(), 50);
}

function checkGrammar() {
  if (grammarAnswered) {
    grammarIdx = (grammarIdx + 1) % grammarQueue.length;
    showGrammar(); return;
  }
  const ex  = grammarQueue[grammarIdx];
  const inp = document.getElementById("grammar-input");
  const fb  = document.getElementById("grammar-feedback");
  const val = inp.value.trim().toLowerCase();
  if (!val) return;
  const accepted = ex.a.map(s => s.toLowerCase());
  const correct  = accepted.includes(val);
  grammarAnswered = true;
  document.getElementById("grammar-topic").textContent = "📚 " + (ex.topic || "Grammar");
  document.getElementById("grammar-full").textContent = ex.full;
  recordResult(ex.card.id, correct);
  if (correct) {
    sessionC++; inp.classList.add("correct");
    fb.textContent = "✓ Correct!"; fb.className = "ex-feedback correct";
  } else {
    sessionW++; inp.classList.add("wrong");
    fb.textContent = `✗ Answer: ${ex.a[0]}`; fb.className = "ex-feedback wrong";
  }
  speakDutch(ex.full);
  updateScoreBar();
}

// ── VERB FORMS MODE ──
function showVerbForm() {
  const tbody   = document.getElementById("verb-table-body");
  const tableEl = document.getElementById("verb-table-el");
  const cardEl  = document.getElementById("verb-card-view");
  document.getElementById("verb-feedback").textContent = "";
  document.getElementById("verb-feedback").className = "ex-feedback";
  verbAnswered = false;

  if (verbViewMode === "table") {
    cardEl.style.display  = "none";
    tableEl.style.display = "";
    if (!verbDeck.length) {
      document.getElementById("verb-infinitive").textContent = "No verbs in this selection.";
      tbody.innerHTML = ""; return;
    }
    const card = verbDeck[verbIdx];
    document.getElementById("verb-infinitive").textContent = card.dutch + " — " + card.english;
    tbody.innerHTML = "";
    Object.entries(card.conjugations).forEach(([pronoun, form]) => {
      const raw = (card.sentences || {})[pronoun] || "";
      const sentDutch = typeof raw === "object" ? raw.s : raw;
      const sentEn    = typeof raw === "object" ? (raw.en || "") : "";
      const primaryForm = form.split(" / ")[0];
      const tr = document.createElement("tr");
      tr.dataset.sentence = sentDutch;
      tr.dataset.sentEn   = sentEn;
      tr.dataset.form = primaryForm;
      const sentenceHtml = sentDutch
        ? sentDutch.replace("___", '<span class="verb-blank">___</span>')
        : "";
      tr.innerHTML = `<td class="vcell-pronoun">${pronoun}</td><td class="vcell-input"><input class="verb-inp" type="text" placeholder="…" autocomplete="off" spellcheck="false" data-answer="${form}" /></td><td class="vcell-sentence-col"><span class="vcell-sentence">${sentenceHtml}</span></td>`;
      tbody.appendChild(tr);
    });
    updateProgress();
    setTimeout(() => tbody.querySelector(".verb-inp")?.focus(), 50);
  } else {
    tableEl.style.display = "none";
    cardEl.style.display  = "";
    if (!verbCardQueue.length) {
      document.getElementById("verb-infinitive").textContent = "No verbs in this selection.";
      document.getElementById("verb-pronoun-display").textContent = "";
      return;
    }
    const ex = verbCardQueue[verbCardIdx];
    document.getElementById("verb-infinitive").textContent      = ex.card.dutch + " — " + ex.card.english;
    document.getElementById("verb-pronoun-display").textContent = ex.pronoun + " →";
    const inp = document.getElementById("verb-card-input");
    inp.value = ""; inp.className = "ex-input";
    updateProgress();
    setTimeout(() => inp.focus(), 50);
  }
}

function checkVerbForm() {
  if (verbViewMode === "table") {
    if (verbAnswered) { verbIdx = (verbIdx + 1) % verbDeck.length; showVerbForm(); return; }
    const inputs = [...document.querySelectorAll("#verb-table-body .verb-inp")];
    if (!inputs.some(inp => inp.value.trim())) return;
    let allCorrect = true;
    inputs.forEach(inp => {
      const val = inp.value.trim().toLowerCase();
      const accepted = inp.dataset.answer.split(" / ").map(s => s.trim().toLowerCase());
      const correct = val && accepted.includes(val);
      inp.classList.toggle("correct", !!correct);
      inp.classList.toggle("wrong", !correct);
      if (!correct) { allCorrect = false; inp.value = inp.dataset.answer; }
    });
    verbAnswered = true;
    const card = verbDeck[verbIdx];
    recordResult(card.id, allCorrect);
    const fb = document.getElementById("verb-feedback");
    if (allCorrect) {
      sessionC++; fb.textContent = "✓ All correct!"; fb.className = "ex-feedback correct";
    } else {
      sessionW++; fb.textContent = "✗ Correct answers shown in red"; fb.className = "ex-feedback wrong";
    }
    speakDutch(card.dutch);
    // reveal example sentences
    document.querySelectorAll("#verb-table-body tr").forEach(tr => {
      const s = tr.dataset.sentence; const f = tr.dataset.form; const en = tr.dataset.sentEn;
      if (!s) return;
      const full = s.replace("___", f);
      const span = tr.querySelector(".vcell-sentence");
      if (!span) return;
      let html = s.replace("___", `<strong>${f}</strong>`);
      if (en) html += `<br><span class="vcell-sentence-en">${en}</span>`;
      span.innerHTML = html + " ";
      const btn = document.createElement("button"); btn.textContent = "🔊"; btn.title = "Listen";
      btn.addEventListener("click", () => speakDutch(full));
      span.appendChild(btn); span.classList.add("show");
    });
    updateScoreBar();
  } else {
    if (verbAnswered) { verbCardIdx = (verbCardIdx + 1) % verbCardQueue.length; showVerbForm(); return; }
    const ex  = verbCardQueue[verbCardIdx];
    const inp = document.getElementById("verb-card-input");
    const fb  = document.getElementById("verb-feedback");
    const val = inp.value.trim().toLowerCase();
    if (!val) return;
    const accepted = ex.answer.split(" / ").map(s => s.trim().toLowerCase());
    const correct  = accepted.includes(val);
    verbAnswered = true;
    recordResult(ex.card.id, correct);
    if (correct) {
      sessionC++; inp.classList.add("correct");
      fb.textContent = "✓ Correct!"; fb.className = "ex-feedback correct";
    } else {
      sessionW++; inp.classList.add("wrong");
      fb.textContent = `✗ Answer: ${ex.answer}`; fb.className = "ex-feedback wrong";
    }
    speakDutch(ex.answer.split(" / ")[0]);
    updateScoreBar();
  }
}

// ── EVENT LISTENERS: mode tabs ──
document.querySelectorAll(".mode-btn").forEach(btn =>
  btn.addEventListener("click", () => setMode(btn.dataset.mode)));

// ── CHAPTER SELECTOR + WEAK TOGGLE ──
document.getElementById("chapter-select").addEventListener("change", function () {
  currentChapter = this.value;
  currentSubcat  = null;
  updateContentToggle();
  updateSubcatRow();
  rebuildDecks();
  setMode(currentMode);
});
document.getElementById("btn-words").addEventListener("click", () => {
  contentMode   = "words";
  currentSubcat = null;
  updateContentToggle();
  updateSubcatRow();
  rebuildDecks();
  setMode(currentMode);
});
document.getElementById("btn-grammar-content").addEventListener("click", () => {
  contentMode   = "grammar";
  currentSubcat = null;
  updateContentToggle();
  updateSubcatRow();
  rebuildDecks();
  setMode(currentMode);
});
document.getElementById("weak-toggle").addEventListener("click", function () {
  weakMode = !weakMode;
  this.classList.toggle("active", weakMode);
  rebuildDecks();
  setMode(currentMode);
});

// ── SHUFFLE + RESET ──
document.getElementById("btn-shuffle").addEventListener("click", () => {
  if (currentMode === "grammar") { shuffle(grammarQueue); grammarIdx = 0; showGrammar(); }
  else if (currentMode === "verb") {
    if (verbViewMode === "table") { shuffle(verbDeck); verbIdx = 0; }
    else { shuffle(verbCardQueue); verbCardIdx = 0; }
    showVerbForm();
  }
  else { shuffle(activeDeck); idx = 0; setMode(currentMode); }
});
document.getElementById("btn-reset").addEventListener("click", () => {
  rebuildDecks();
  resetSession();
  setMode(currentMode);
});

// ── PREV / NEXT ──
document.getElementById("btn-prev").addEventListener("click", () => {
  if (currentMode === "grammar") { grammarIdx = (grammarIdx - 1 + grammarQueue.length) % grammarQueue.length; showGrammar(); }
  else if (currentMode === "verb") {
    if (verbViewMode === "table") verbIdx = (verbIdx - 1 + verbDeck.length) % verbDeck.length;
    else verbCardIdx = (verbCardIdx - 1 + verbCardQueue.length) % verbCardQueue.length;
    showVerbForm();
  }
  else { idx = (idx - 1 + activeDeck.length) % activeDeck.length; setMode(currentMode); }
});
document.getElementById("btn-next").addEventListener("click", () => {
  if (currentMode === "grammar") { grammarIdx = (grammarIdx + 1) % grammarQueue.length; showGrammar(); }
  else if (currentMode === "verb") {
    if (verbViewMode === "table") verbIdx = (verbIdx + 1) % verbDeck.length;
    else verbCardIdx = (verbCardIdx + 1) % verbCardQueue.length;
    showVerbForm();
  }
  else { idx = (idx + 1) % activeDeck.length; setMode(currentMode); }
});

// ── KEYBOARD ──
document.addEventListener("keydown", e => {
  if (["type-input","grammar-input","verb-card-input"].includes(document.activeElement?.id)) return;
  if (document.activeElement?.classList.contains("verb-inp")) return;
  if (e.key === "ArrowRight") document.getElementById("btn-next").click();
  if (e.key === "ArrowLeft")  document.getElementById("btn-prev").click();
  if ((e.key === " " || e.key === "Enter") && currentMode === "flip")
    document.getElementById("card").classList.toggle("flipped");
  if (e.key === "1" && currentMode === "mc") document.querySelectorAll(".mc-option")[0]?.click();
  if (e.key === "2" && currentMode === "mc") document.querySelectorAll(".mc-option")[1]?.click();
  if (e.key === "3" && currentMode === "mc") document.querySelectorAll(".mc-option")[2]?.click();
  if (e.key === "4" && currentMode === "mc") document.querySelectorAll(".mc-option")[3]?.click();
});

// ── FLIP CARD LISTENERS ──
document.getElementById("scene").addEventListener("click", e => {
  if (e.target.id === "btn-speak-flip") return;
  if (currentMode === "flip") document.getElementById("card").classList.toggle("flipped");
});
document.getElementById("btn-speak-flip").addEventListener("click", e => {
  e.stopPropagation();
  if (activeDeck[idx]) speakDutch(activeDeck[idx].dutch);
});

// ── TYPE MODE LISTENERS ──
document.getElementById("btn-check").addEventListener("click", checkTyping);
document.getElementById("btn-skip").addEventListener("click", () => {
  if (!answered) {
    const card = activeDeck[idx];
    const fb = document.getElementById("type-feedback");
    fb.textContent = `Answer: ${card.dutch}`; fb.className = "ex-feedback wrong";
    document.getElementById("type-input").classList.add("wrong");
    answered = true; sessionW++; updateScoreBar();
    speakDutch(card.dutch);
  } else { idx = (idx + 1) % activeDeck.length; showTyping(); }
});
document.getElementById("type-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkTyping();
});
document.getElementById("btn-speak-type").addEventListener("click", () => {
  if (activeDeck[idx]) speakDutch(activeDeck[idx].dutch);
});

// ── GRAMMAR MODE LISTENERS ──
document.getElementById("btn-grammar-check").addEventListener("click", checkGrammar);
document.getElementById("btn-grammar-skip").addEventListener("click", () => {
  if (!grammarAnswered) {
    const ex = grammarQueue[grammarIdx];
    document.getElementById("grammar-topic").textContent = "📚 " + (ex.topic || "Grammar");
    document.getElementById("grammar-feedback").textContent = `Answer: ${ex.a[0]}`;
    document.getElementById("grammar-feedback").className = "ex-feedback wrong";
    document.getElementById("grammar-full").textContent = ex.full;
    document.getElementById("grammar-input").classList.add("wrong");
    grammarAnswered = true; sessionW++; updateScoreBar(); speakDutch(ex.full);
  } else { grammarIdx = (grammarIdx + 1) % grammarQueue.length; showGrammar(); }
});
document.getElementById("grammar-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkGrammar();
});
document.getElementById("btn-speak-grammar").addEventListener("click", () => {
  const ex = grammarQueue[grammarIdx];
  speakDutch(grammarAnswered ? ex.full : ex.s.replace("___", "…"));
});

// ── VERB FORMS LISTENERS ──
document.getElementById("btn-verb-check").addEventListener("click", checkVerbForm);
document.getElementById("btn-verb-skip").addEventListener("click", () => {
  if (!verbAnswered) {
    if (verbViewMode === "table") {
      const inputs = [...document.querySelectorAll("#verb-table-body .verb-inp")];
      inputs.forEach(inp => { inp.value = inp.dataset.answer; inp.classList.add("wrong"); });
      const card = verbDeck[verbIdx];
      recordResult(card.id, false); speakDutch(card.dutch);
      document.querySelectorAll("#verb-table-body tr").forEach(tr => {
        const s = tr.dataset.sentence; const f = tr.dataset.form; if (!s) return;
        const full = s.replace("___", f);
        const span = tr.querySelector(".vcell-sentence"); if (!span) return;
        span.innerHTML = s.replace("___", `<strong>${f}</strong>`) + " ";
        const btn = document.createElement("button"); btn.textContent = "🔊"; btn.title = "Listen";
        btn.addEventListener("click", () => speakDutch(full)); span.appendChild(btn); span.classList.add("show");
      });
    } else {
      const ex = verbCardQueue[verbCardIdx];
      const inp = document.getElementById("verb-card-input");
      inp.value = ex.answer; inp.classList.add("wrong");
      recordResult(ex.card.id, false);
      speakDutch(ex.answer.split(" / ")[0]);
    }
    verbAnswered = true; sessionW++;
    document.getElementById("verb-feedback").textContent = "Answers shown";
    document.getElementById("verb-feedback").className = "ex-feedback wrong";
    updateScoreBar();
  } else {
    if (verbViewMode === "table") verbIdx = (verbIdx + 1) % verbDeck.length;
    else verbCardIdx = (verbCardIdx + 1) % verbCardQueue.length;
    showVerbForm();
  }
});
document.getElementById("verb-table-body").addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const inputs = [...document.querySelectorAll("#verb-table-body .verb-inp")];
  const cur = inputs.indexOf(e.target);
  if (!verbAnswered && cur < inputs.length - 1) inputs[cur + 1].focus();
  else checkVerbForm();
});
document.getElementById("verb-card-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkVerbForm();
});
document.getElementById("btn-speak-verb").addEventListener("click", () => {
  if (verbViewMode === "table" && verbDeck[verbIdx]) speakDutch(verbDeck[verbIdx].dutch);
  else if (verbViewMode === "card" && verbCardQueue[verbCardIdx]) speakDutch(verbCardQueue[verbCardIdx].card.dutch);
});
// ── VERB VIEW TOGGLE ──
document.getElementById("btn-verb-table").addEventListener("click", () => {
  verbViewMode = "table";
  document.getElementById("btn-verb-table").classList.add("active");
  document.getElementById("btn-verb-card").classList.remove("active");
  verbAnswered = false; showVerbForm();
});
document.getElementById("btn-verb-card").addEventListener("click", () => {
  verbViewMode = "card";
  document.getElementById("btn-verb-card").classList.add("active");
  document.getElementById("btn-verb-table").classList.remove("active");
  verbAnswered = false; showVerbForm();
});

// ── EXPORT / IMPORT ──
document.getElementById("btn-export").addEventListener("click", () => {
  const data = { deck: DECK, stats: loadStats(), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `nl_learner_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
});

document.getElementById("import-file").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.stats) saveStats(data.stats);
      alert("Progress imported. Refreshing…");
      location.reload();
    } catch { alert("Invalid JSON file."); }
  };
  reader.readAsText(file);
  this.value = "";
});

// ── INIT ──
updateContentToggle();
updateSubcatRow();
rebuildDecks();
setMode("flip");
</script>
